<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Pork is Calling</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #phone-screen {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Main Image Styling */
        .main-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Video Styling */
        #video-display {
            display: none;
            z-index: 10;
        }

        /* UI Overlay */
        #ui-layer {
            position: relative;
            z-index: 5;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 80px;
        }

        /* Button Container */
        #button-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-size: 14px;
            gap: 10px;
        }

        /* Circular Button Style like the Image */
        .call-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .call-btn:active { transform: scale(0.9); }

        .decline { background-color: #ff3b30; }
        .accept { background-color: #4cd964; }

        /* Icon Styling (Using Unicode for phone icons) */
        .icon {
            color: white;
            font-size: 35px;
            transform: rotate(135deg); /* Flips the handset for decline */
        }
        .accept .icon { transform: rotate(0deg); }

        /* Glass Shatter Effect */
        .shatter-effect {
            filter: contrast(1.5) brightness(0.8);
            background-image: url('https://www.transparenttextures.com/patterns/glass-shattered.png');
            pointer-events: none;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div id="phone-screen">
    <img id="display-img" class="main-media" src="">
    <video id="video-display" class="main-media" playsinline></video>

    <div id="ui-layer">
        <div id="button-container">
            <div class="btn-wrapper" id="decline-wrap">
                <button id="decline-btn" class="call-btn decline">
                    <span class="icon">📞</span>
                </button>
                <span>Decline</span>
            </div>
            <div class="btn-wrapper" id="accept-wrap">
                <button id="accept-btn" class="call-btn accept">
                    <span class="icon">📞</span>
                </button>
                <span>Accept</span>
            </div>
        </div>
    </div>
</div>

<script>
    const displayImg = document.getElementById('display-img');
    const videoDisplay = document.getElementById('video-display');
    const declineBtn = document.getElementById('decline-btn');
    const acceptBtn = document.getElementById('accept-btn');
    const uiLayer = document.getElementById('ui-layer');

    // Make sure these filenames match exactly what is in your GitHub Repo!
    const callingImages = [
        'images (48).jpeg',
        'images (49).jpeg',
        'John_Pork.webp',
        '112371_1684629236_e94e6ef83f89a367cd751895411f6596.webp'
    ];
    
    const lastChanceImg = '你的段落文字_20260407_103036_0000.png';
    const finalImg = '你的段落文字_20260407_103153_0000.png';
    const mainVideo = 'Monday Left Me Broken - John Pork #shorts - Supreme Troll (720p, h264, youtube).mp4';

    let strikes = 0;

    // Randomly pick initial image
    displayImg.src = callingImages[Math.floor(Math.random() * callingImages.length)];

    // Accept Action
    acceptBtn.addEventListener('click', () => {
        uiLayer.style.display = 'none';
        displayImg.style.display = 'none';
        videoDisplay.style.display = 'block';
        videoDisplay.src = mainVideo;
        videoDisplay.play();
    });

    // Decline Action
    declineBtn.addEventListener('click', () => {
        strikes++;
        if (strikes === 1) {
            displayImg.src = lastChanceImg;
            declineBtn.classList.add('shatter-effect');
        } else {
            displayImg.src = finalImg;
            uiLayer.style.display = 'none';
        }
    });
</script>

</body>
</html>
