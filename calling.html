<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Pork Calling</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, sans-serif;
        }

        #container {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .media {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: contain; /* Fixes proportion issues */
            z-index: 1;
        }

        #ui {
            position: absolute;
            bottom: 10%; width: 100%;
            z-index: 10;
            display: flex; justify-content: space-evenly;
        }

        .btn-container {
            display: flex; flex-direction: column; align-items: center;
            color: white; font-size: 13px;
        }

        .btn {
            width: 72px; height: 72px;
            border-radius: 50%; border: none;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 8px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
        }

        .red { background-color: #ff3b30; }
        .green { background-color: #4cd964; }

        .icon { width: 32px; height: 32px; fill: white; }
        .decline-icon { transform: rotate(135deg); }

        /* GLASS SHATTER EFFECT */
        .shattered::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid white;
            clip-path: polygon(0% 20%, 35% 0%, 15% 45%, 55% 25%, 35% 65%, 75% 45%, 55% 85%, 95% 65%, 75% 100%, 100% 85%, 85% 45%, 100% 25%);
            pointer-events: none; /* IMPORTANT: Allows 2nd click to go through to the button */
        }
    </style>
</head>
<body>

<div id="container">
    <img id="bg-img" class="media" src="">
    <video id="bg-vid" class="media" style="display:none;" playsinline></video>

    <div id="ui">
        <div class="btn-container">
            <button id="refuse" class="btn red">
                <svg class="icon decline-icon" viewBox="0 0 24 24"><path d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z"/></svg>
            </button>
            <span>Decline</span>
        </div>
        <div class="btn-container">
            <button id="accept" class="btn green">
                <svg class="icon" viewBox="0 0 24 24"><path d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z"/></svg>
            </button>
            <span>Accept</span>
        </div>
    </div>
</div>

<script>
    const imgElement = document.getElementById('bg-img');
    const vidElement = document.getElementById('bg-vid');
    const refuseBtn = document.getElementById('refuse');
    const acceptBtn = document.getElementById('accept');
    const uiLayer = document.getElementById('ui');

    // Filenames updated based on your screenshot
    const startImages = ['Calling1.webp', 'Calling2.webp', 'Calling3.jpeg', 'Calling4.jpeg'];
    const chanceImage = 'Final1.png';
    const deadImage = 'Final2.png';
    const mainVideo = 'Video.mp4';

    let refuseCount = 0;

    // Pick random start image
    imgElement.src = startImages[Math.floor(Math.random() * startImages.length)];

    acceptBtn.onclick = () => {
        uiLayer.style.display = 'none';
        imgElement.style.display = 'none';
        vidElement.style.display = 'block';
        vidElement.src = mainVideo;
        vidElement.play().catch(() => {
            vidElement.controls = true; // Fallback if autoplay is blocked
        });
    };

    refuseBtn.onclick = () => {
        refuseCount++;
        if (refuseCount === 1) {
            imgElement.src = chanceImage;
            refuseBtn.classList.add('shattered');
        } else {
            imgElement.src = deadImage;
            uiLayer.style.display = 'none';
        }
    };
</script>

</body>
</html>
