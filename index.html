<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders Minigame</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: #000000;
            border: 2px solid #e94560;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.5);
            max-width: 100%;
        }
        /* Mobile/Touch Controls */
        #controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .btn {
            background-color: #0f3460;
            color: white;
            border: 2px solid #e94560;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        .btn:active {
            background-color: #e94560;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="600" height="500"></canvas>

    <div id="controls">
        <button class="btn" id="leftBtn">◀ Left</button>
        <button class="btn" id="shootBtn">FIRE</button>
        <button class="btn" id="rightBtn">Right ▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game State
        let score = 0;
        let lives = 3;
        let isGameOver = false;
        let isGameWon = false;
        let animationId;

        // Player ship
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 40,
            width: 40,
            height: 20,
            speed: 5,
            color: '#00ffcc',
            movingLeft: false,
            movingRight: false
        };

        // Arrays to hold entities
        let bullets = [];
        let alienBullets = [];
        let aliens = [];

        // Alien configuration
        const alienRows = 4;
        const alienCols = 8;
        const alienWidth = 30;
        const alienHeight = 20;
        const alienPadding = 15;
        let alienDirection = 1; // 1 for right, -1 for left
        let alienSpeed = 1;

        // Initialize Aliens
        function initAliens() {
            aliens = [];
            for (let r = 0; r < alienRows; r++) {
                for (let c = 0; c < alienCols; c++) {
                    aliens.push({
                        x: 50 + c * (alienWidth + alienPadding),
                        y: 50 + r * (alienHeight + alienPadding),
                        width: alienWidth,
                        height: alienHeight,
                        color: r % 2 === 0 ? '#ff0055' : '#ffaa00',
                        status: 1 // 1 means alive
                    });
                }
            }
        }

        // Input Handling (Keyboard)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') player.movingLeft = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') player.movingRight = true;
            if (e.code === 'Space') shoot();
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') player.movingLeft = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') player.movingRight = false;
        });

        // Input Handling (On-Screen Buttons)
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const shootBtn = document.getElementById('shootBtn');

        const addPressEvent = (btn, action, isDown) => {
            btn.addEventListener('mousedown', () => action(isDown));
            btn.addEventListener('mouseup', () => action(!isDown));
            btn.addEventListener('mouseleave', () => action(false));
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); action(isDown); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); action(!isDown); });
        };

        addPressEvent(leftBtn, (val) => player.movingLeft = val, true);
        addPressEvent(rightBtn, (val) => player.movingRight = val, true);
        shootBtn.addEventListener('mousedown', shoot);
        shootBtn.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });

        function shoot() {
            if (isGameOver || isGameWon) {
                resetGame();
                return;
            }
            // Prevent spamming too many bullets
            if (bullets.length < 3) {
                bullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y,
                    width: 4,
                    height: 10,
                    speed: 7,
                    color: '#00ffcc'
                });
            }
        }

        function alienShoot() {
            const aliveAliens = aliens.filter(a => a.status === 1);
            if (aliveAliens.length === 0) return;
            
            // Randomly pick an alien to shoot
            if (Math.random() < 0.02) {
                const randomAlien = aliveAliens[Math.floor(Math.random() * aliveAliens.length)];
                alienBullets.push({
                    x: randomAlien.x + randomAlien.width / 2 - 2,
                    y: randomAlien.y + randomAlien.height,
                    width: 4,
                    height: 10,
                    speed: 4,
                    color: '#ff0055'
                });
            }
        }

        // Collision Detection
        function detectCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function update() {
            if (isGameOver || isGameWon) return;

            // Move Player
            if (player.movingLeft && player.x > 0) player.x -= player.speed;
            if (player.movingRight && player.x < canvas.width - player.width) player.x += player.speed;

            // Move Bullets
            bullets.forEach((b, index) => {
                b.y -= b.speed;
                if (b.y < 0) bullets.splice(index, 1);
            });

            // Move Alien Bullets
            alienBullets.forEach((b, index) => {
                b.y += b.speed;
                if (b.y > canvas.height) alienBullets.splice(index, 1);
                
                // Check if alien bullet hits player
                if (detectCollision(b, player)) {
                    alienBullets.splice(index, 1);
                    lives--;
                    if (lives <= 0) isGameOver = true;
                }
            });

            // Move Aliens
            let hitWall = false;
            let aliveCount = 0;

            aliens.forEach(a => {
                if (a.status === 1) {
                    aliveCount++;
                    a.x += alienSpeed * alienDirection;
                    if (a.x <= 0 || a.x + a.width >= canvas.width) {
                        hitWall = true;
                    }
                    
                    // Check if alien reaches player
                    if (a.y + a.height >= player.y) {
                        isGameOver = true;
                    }

                    // Check bullet collisions
                    bullets.forEach((b, bIndex) => {
                        if (detectCollision(b, a)) {
                            a.status = 0; // Kill alien
                            bullets.splice(bIndex, 1); // Remove bullet
                            score += 10;
                            alienSpeed += 0.05; // Slightly increase difficulty
                        }
                    });
                }
            });

            if (aliveCount === 0) isGameWon = true;

            // Drop aliens down if they hit the edge
            if (hitWall) {
                alienDirection *= -1;
                aliens.forEach(a => {
                    if (a.status === 1) a.y += 20;
                });
            }

            alienShoot();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isGameOver) {
                ctx.fillStyle = 'red';
                ctx.font = '40px Courier New';
                ctx.fillText('GAME OVER', canvas.width/2 - 100, canvas.height/2);
                ctx.font = '20px Courier New';
                ctx.fillStyle = 'white';
                ctx.fillText('Tap FIRE or Space to Restart', canvas.width/2 - 160, canvas.height/2 + 40);
                return;
            }

            if (isGameWon) {
                ctx.fillStyle = '#00ffcc';
                ctx.font = '40px Courier New';
                ctx.fillText('YOU WIN!', canvas.width/2 - 90, canvas.height/2);
                ctx.font = '20px Courier New';
                ctx.fillStyle = 'white';
                ctx.fillText('Score: ' + score, canvas.width/2 - 50, canvas.height/2 + 40);
                ctx.fillText('Tap FIRE or Space to Restart', canvas.width/2 - 160, canvas.height/2 + 80);
                return;
            }

            // Draw UI
            ctx.fillStyle = 'white';
            ctx.font = '16px Courier New';
            ctx.fillText('Score: ' + score, 10, 20);
            ctx.fillText('Lives: ' + lives, canvas.width - 100, 20);

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // Player gun barrel
            ctx.fillRect(player.x + player.width/2 - 5, player.y - 10, 10, 10);

            // Draw Bullets
            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.width, b.height);
            });

            alienBullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.width, b.height);
            });

            // Draw Aliens
            aliens.forEach(a => {
                if (a.status === 1) {
                    ctx.fillStyle = a.color;
                    ctx.fillRect(a.x, a.y, a.width, a.height);
                }
            });
        }

        function gameLoop() {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            score = 0;
            lives = 3;
            alienSpeed = 1;
            isGameOver = false;
            isGameWon = false;
            bullets = [];
            alienBullets = [];
            player.x = canvas.width / 2 - 20;
            initAliens();
        }

        // Start the game
        initAliens();
        gameLoop();
    </script>
</body>
</html>
