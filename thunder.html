<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Thunder distance calculator</title>
        <style>
            body{
                background-color: rgb(250, 235, 215);
                font-family: Arial, Helvetica, sans-serif;
            }
            #distance{
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <h1>Wonder how far that lightning was?</h1>
        <h2>Time how long it takes between when you saw the lightning and when you hear the thunder!</h2>
            <input type="number" id="data" min="0" oninput="this.value = Math.abs(this.value)"><br>
            <div style="padding-top: 10px;">
            <input type="button" onclick="calcDist()" style="width: fit-content;" value="Calculate!"></button>
            </div>
            <div>
                <p>The distance between you and the thunder is <span id="result">...</span></p>
            </div>
        <script>
            function calcDist() {
                const inputtime = document.getElementById('data');
                const valuetime = parseFloat(inputtime.value);
                const dist = valuetime * 343 * 299792458 / (299792458 - 343);
                document.getElementById('result').innerHTML = dist + " metres";
            }
        </script>
    </body>
</html>
